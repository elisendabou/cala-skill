# OpenClaw / ClawHub skill manifest
# Same content as SKILL.md; this format is required by ClawHub and some OpenClaw CLI installs.
name: cala-mcp
version: "1.0.0"
author: elisendabou
description: Connect OpenClaw or Cursor to Cala's MCP for verified knowledge search. Use when the user wants to connect to Cala MCP, set up Cala, get an API key, or use Cala's knowledge layer (knowledge search, knowledge query, entity search, get entity, entity introspection).

license: MIT

permissions:
  - network

# No config required: user adds Cala MCP and API key to their client (e.g. ~/.cursor/mcp.json or OpenClaw MCP config).

entryPoint:
  type: natural
  prompt: |
    When the user wants to connect to Cala's MCP or use Cala for knowledge search:
    1. Tell them to get an API key from https://console.cala.ai/api-keys
    2. Tell them to add the Cala MCP server to their client config. For Cursor, edit ~/.cursor/mcp.json and add under mcpServers: "Cala" with url "https://api.cala.ai/mcp/" and headers "X-API-KEY": "<their key>". For Claude Desktop use npx mcp-remote with the same URL and header. For VS Code use .vscode/mcp.json with type http, same url and headers. For OpenClaw use the MCP config location that their setup expects (same JSON shape).
    3. Tell them to restart the client so the MCP server loads.
    4. After connection they get tools: knowledge_search (natural language), knowledge_query (structured filters), entity_search, get_entity, entity_introspection. Point them to https://docs.cala.ai/mcp for full docs.
    For full step-by-step instructions and client-specific details, read SKILL.md in this skill directory.
